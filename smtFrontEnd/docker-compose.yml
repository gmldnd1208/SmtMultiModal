services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # img_path가 ./bbox_image/... 상대경로로 저장돼 있어서
      # 백엔드 실행 위치(/app) 기준으로 bbox_image 폴더를 연결
      - ../bbox_image:/app/bbox_image:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 빌드 시점에 API 주소 주입 (frontend/.env 값 사용)
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
